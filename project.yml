name: SolWhisper
options:
  bundleIdPrefix: cloud.solay
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: cloud.solay.SolWhisper
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_SWIFT_FLAGS: ""

targets:
  SolWhisper:
    type: application
    platform: macOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_NAME: SolWhisper
        ENABLE_HARDENED_RUNTIME: YES
    entitlements:
      path: Resources/SolWhisper.entitlements
      properties:
        com.apple.security.device.audio-input: true
        com.apple.security.automation.apple-events: true
        com.apple.security.network.client: true
